<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Roux — Get Started</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:      #7A8C6E;
    --forest:    #3D6B4F;
    --forest-dk: #2E5038;
    --ink:       #2C2417;
    --driftwood: #8C7B6B;
    --linen:     #E8E0D0;
    --cream:     #FAF8F4;
    --honey:     #C49A3C;
    --walnut:    #8B6F52;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
  }

  /* ── SUBTLE BACKGROUND GRADIENT ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 15%, rgba(122,140,110,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(196,154,60,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  /* ── BACK BUTTON ── */
  .back-btn {
    position: absolute; top: 56px; left: 24px;
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid rgba(200,185,160,0.6);
    background: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--driftwood);
    box-shadow: 0 1px 4px rgba(80,60,30,0.07);
    transition: all 0.15s;
    z-index: 10;
    opacity: 0;
    animation: fadeUp 0.4s ease 0.1s forwards;
  }
  .back-btn:active { background: var(--linen); }
  .back-btn svg { width: 16px; height: 16px; }

  /* ── SCREEN ── */
  .screen {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 28px 48px;
  }

  /* ── MINI WORDMARK ── */
  .mini-brand {
    margin-top: 52px;
    margin-bottom: 52px;
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.05s forwards;
  }
  .mini-wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 600;
    color: var(--ink); letter-spacing: -0.5px;
  }
  .mini-wordmark em { font-style: italic; color: var(--forest); }

  /* ── HEADING ── */
  .heading-block {
    text-align: center;
    margin-bottom: 44px;
    width: 100%;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.15s forwards;
  }
  .heading {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 500;
    color: var(--ink); line-height: 1.25;
    margin-bottom: 10px;
  }
  .subheading {
    font-size: 14px; color: var(--driftwood);
    font-weight: 300; line-height: 1.6;
  }

  /* ── CHOICE CARDS ── */
  .choice-cards {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 36px;
  }

  .choice-card {
    width: 100%;
    background: white;
    border: 1.5px solid rgba(200,185,160,0.5);
    border-radius: 18px;
    padding: 24px 22px;
    cursor: pointer;
    display: flex; align-items: center; gap: 18px;
    box-shadow: 0 2px 8px rgba(80,60,30,0.06), 0 1px 2px rgba(80,60,30,0.04);
    transition: all 0.18s;
    text-align: left;
    opacity: 0;
  }
  .choice-card:nth-child(1) { animation: fadeUp 0.5s ease 0.28s forwards; }
  .choice-card:nth-child(2) { animation: fadeUp 0.5s ease 0.38s forwards; }

  .choice-card:active {
    transform: scale(0.985);
    box-shadow: 0 1px 4px rgba(80,60,30,0.08);
    border-color: rgba(61,107,79,0.4);
    background: rgba(250,248,244,0.9);
  }
  .choice-card.selected {
    border-color: var(--forest);
    box-shadow: 0 0 0 3px rgba(61,107,79,0.1), 0 2px 8px rgba(61,107,79,0.12);
  }

  /* Icon container */
  .choice-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .choice-icon.create { background: rgba(61,107,79,0.08); }
  .choice-icon.join   { background: rgba(196,154,60,0.08); }
  .choice-icon svg    { width: 26px; height: 26px; }
  .choice-icon.create svg { color: var(--forest); }
  .choice-icon.join   svg { color: var(--honey); }

  /* Card text */
  .choice-text { flex: 1; min-width: 0; }
  .choice-title {
    font-size: 16px; font-weight: 500;
    color: var(--ink); margin-bottom: 4px;
    font-family: 'Playfair Display', serif;
  }
  .choice-desc {
    font-size: 12.5px; color: var(--driftwood);
    font-weight: 300; line-height: 1.5;
  }

  /* Arrow */
  .choice-arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--linen);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--driftwood);
    transition: all 0.18s;
  }
  .choice-card:active .choice-arrow {
    background: rgba(61,107,79,0.1);
    color: var(--forest);
  }
  .choice-arrow svg { width: 13px; height: 13px; }

  /* ── DIVIDER WITH OR ── */
  .or-row {
    width: 100%; display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.4s ease 0.48s forwards;
  }
  .or-line { flex: 1; height: 1px; background: var(--linen); }
  .or-text  { font-size: 11px; color: var(--driftwood); font-weight: 300; letter-spacing: 1px; text-transform: uppercase; }

  /* ── HAVE A CODE ── */
  .have-code {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    background: transparent;
    border: 1px dashed rgba(122,140,110,0.4);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 400;
    color: var(--sage);
    transition: all 0.15s;
    opacity: 0;
    animation: fadeUp 0.4s ease 0.52s forwards;
  }
  .have-code:active { background: rgba(122,140,110,0.06); border-style: solid; }
  .have-code svg { width: 15px; height: 15px; }

  /* ── STEP INDICATOR ── */
  .step-indicator {
    display: flex; gap: 6px;
    margin-top: 40px;
    opacity: 0;
    animation: fadeIn 0.4s ease 0.6s forwards;
  }
  .step-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .step-dot.active  { background: var(--forest); width: 18px; border-radius: 3px; }
  .step-dot.inactive { background: var(--linen); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<!-- ── BACK BUTTON ── -->
<button class="back-btn" onclick="history.back()" aria-label="Back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</button>

<div class="screen">

  <!-- MINI WORDMARK -->
  <div class="mini-brand">
    <div class="mini-wordmark">R<em>oux</em></div>
  </div>

  <!-- HEADING -->
  <div class="heading-block">
    <div class="heading">Let's get you set up.</div>
    <div class="subheading">Are you starting a new home,<br>or joining one that already exists?</div>
  </div>

  <!-- CHOICE CARDS -->
  <div class="choice-cards">

    <!-- CREATE -->
    <button class="choice-card" onclick="selectChoice(this, 'create')">
      <div class="choice-icon create">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- House + plus -->
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <line x1="12" y1="13" x2="12" y2="19"/>
          <line x1="9"  y1="16" x2="15" y2="16"/>
        </svg>
      </div>
      <div class="choice-text">
        <div class="choice-title">Start from scratch</div>
        <div class="choice-desc">Create a new home for your family. You'll be the admin.</div>
      </div>
      <div class="choice-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </button>

    <!-- JOIN -->
    <button class="choice-card" onclick="selectChoice(this, 'join')">
      <div class="choice-icon join">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <!-- People joining -->
          <circle cx="9" cy="7" r="3"/>
          <path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <div class="choice-text">
        <div class="choice-title">Join a home</div>
        <div class="choice-desc">Someone invited you. You'll join their kitchen as a member.</div>
      </div>
      <div class="choice-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </button>

  </div>

  <!-- OR / HAVE A CODE -->
  <div class="or-row">
    <div class="or-line"></div>
    <div class="or-text">or</div>
    <div class="or-line"></div>
  </div>

  <button class="have-code" onclick="selectChoice(this, 'code')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
    I have an invite code
  </button>

  <!-- STEP INDICATOR -->
  <div class="step-indicator">
    <div class="step-dot active"></div>
    <div class="step-dot inactive"></div>
    <div class="step-dot inactive"></div>
  </div>

</div>

<script>
  function selectChoice(el, type) {
    // Visual feedback — brief selection state
    document.querySelectorAll('.choice-card, .have-code').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    // Route (placeholder — real build would navigate)
    setTimeout(() => {
      if (type === 'create') {
        alert('→ Screen 3a: Create Household flow');
      } else if (type === 'join') {
        alert('→ Screen 3b: Join Household flow');
      } else if (type === 'code') {
        alert('→ Screen 3b: Join via invite code');
      }
    }, 180);
  }
</script>

</body>
</html>
