<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Roux — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:      #7A8C6E;
    --forest:    #3D6B4F;
    --forest-dk: #2E5038;
    --ink:       #2C2417;
    --driftwood: #8C7B6B;
    --linen:     #E8E0D0;
    --cream:     #FAF8F4;
    --honey:     #C49A3C;
    --walnut:    #8B6F52;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(122,140,110,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 80%, rgba(196,154,60,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 40%, rgba(139,111,82,0.04) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── DECORATIVE KITCHEN OBJECT — Recipe Box ── */
  .decor-wrap {
    position: fixed;
    bottom: -10px;
    right: -18px;
    width: 200px;
    height: 180px;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: decorFade 1.2s ease 1.0s forwards;
  }
  @keyframes decorFade {
    to { opacity: 0.055; }
  }

  /* ── MAIN LAYOUT ── */
  .screen {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 32px 48px;
  }

  /* ── TOP SPACER — breathable ── */
  .top-space { flex: 1.2; min-height: 80px; }
  .bottom-space { flex: 1; min-height: 40px; }

  /* ── WORDMARK BLOCK ── */
  .brand-block {
    text-align: center;
    margin-bottom: 18px;
    opacity: 0;
    transform: scale(0.95);
    animation: logoIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
  }
  @keyframes logoIn {
    to { opacity: 1; transform: scale(1); }
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 58px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .wordmark em {
    font-style: italic;
    color: var(--forest);
  }

  /* ── TAGLINE ── */
  .tagline {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    font-style: italic;
    color: var(--sage);
    letter-spacing: 0.3px;
    line-height: 1.5;
    opacity: 0;
    animation: taglineIn 0.7s ease 0.85s forwards;
  }
  @keyframes taglineIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── DIVIDER ── */
  .divider-line {
    width: 40px;
    height: 1px;
    background: var(--linen);
    margin: 32px auto;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.1s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── KITCHEN ILLUSTRATION — centered, airy ── */
  .illustration {
    width: 120px;
    height: 96px;
    margin-bottom: 36px;
    opacity: 0;
    animation: illustIn 0.8s ease 1.05s forwards;
  }
  @keyframes illustIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.65; transform: translateY(0); }
  }

  /* ── BUTTONS ── */
  .btn-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .btn-primary {
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    background: var(--forest);
    color: white;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(30,55,35,0.28), 0 1px 3px rgba(30,55,35,0.15);
    opacity: 0;
    animation: btnIn 0.5s ease 1.15s forwards;
  }
  .btn-primary:active {
    background: var(--forest-dk);
    transform: scale(0.98);
    box-shadow: 0 2px 8px rgba(30,55,35,0.2);
  }

  .btn-secondary {
    width: 100%;
    padding: 15px 20px;
    border-radius: 14px;
    background: transparent;
    color: var(--forest);
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border: 1.5px solid rgba(61,107,79,0.4);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.12s;
    opacity: 0;
    animation: btnIn 0.5s ease 1.25s forwards;
  }
  .btn-secondary:active {
    background: rgba(61,107,79,0.06);
    transform: scale(0.98);
  }

  @keyframes btnIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── INVITE HINT ── */
  .invite-hint {
    font-size: 12px;
    color: var(--driftwood);
    font-weight: 300;
    text-align: center;
    line-height: 1.6;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.4s forwards;
  }
  .invite-hint a {
    color: var(--sage);
    font-weight: 400;
    text-decoration: none;
    border-bottom: 1px solid rgba(122,140,110,0.3);
    padding-bottom: 1px;
  }

  /* ── LEGAL ── */
  .legal {
    font-size: 10px;
    color: var(--driftwood);
    opacity: 0.5;
    text-align: center;
    line-height: 1.7;
    margin-top: 28px;
    font-weight: 300;
    animation: fadeIn 0.5s ease 1.5s forwards;
    opacity: 0;
  }
  .legal a { color: inherit; text-decoration: underline; }

</style>
</head>
<body>

<!-- ── LARGE BACKGROUND RECIPE BOX ── -->
<div class="decor-wrap">
  <svg viewBox="0 0 160 140" fill="none" stroke="var(--ink)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Box body -->
    <rect x="8" y="30" width="144" height="100" rx="6" stroke-width="3"/>
    <!-- Lid -->
    <path d="M8,52 L152,52" stroke-width="3"/>
    <path d="M40,30 L40,14 Q80,6 120,14 L120,30" stroke-width="3"/>
    <!-- Recipe card tabs -->
    <rect x="28" y="62" width="104" height="58" rx="3" stroke-width="2.2"/>
    <!-- Lines on card -->
    <line x1="40" y1="78" x2="118" y2="78" stroke-width="1.8"/>
    <line x1="40" y1="90" x2="118" y2="90" stroke-width="1.8"/>
    <line x1="40" y1="102" x2="96"  y2="102" stroke-width="1.8"/>
    <!-- Small divider tabs -->
    <rect x="58" y="24" width="20" height="10" rx="2" stroke-width="1.8"/>
    <rect x="84" y="24" width="20" height="10" rx="2" stroke-width="1.8"/>
  </svg>
</div>

<!-- ── SCREEN ── -->
<div class="screen">

  <div class="top-space"></div>

  <!-- WORDMARK -->
  <div class="brand-block">
    <div class="wordmark">R<em>oux</em></div>
    <div class="tagline">Roux and You — let's make something good.</div>
  </div>

  <!-- KITCHEN ILLUSTRATION — centered, small, airy -->
  <div class="divider-line"></div>

  <svg class="illustration" viewBox="0 0 120 96" fill="none" stroke="var(--ink)" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- Cutting board -->
    <rect x="14" y="38" width="92" height="52" rx="5" stroke-width="2"/>
    <rect x="20" y="44" width="80" height="40" rx="3" stroke-width="1.4" opacity="0.5"/>
    <!-- Board handle -->
    <path d="M14,58 L4,58 Q2,58 2,60 L2,66 Q2,68 4,68 L14,68" stroke-width="2"/>
    <!-- Herbs on board -->
    <line x1="45" y1="74" x2="45" y2="54" stroke-width="1.8"/>
    <path d="M45,66 C40,60 34,62 36,56 C38,50 44,54 45,60" stroke-width="1.6"/>
    <path d="M45,60 C50,54 56,56 54,50 C52,44 46,48 45,55" stroke-width="1.6"/>
    <!-- Spoon -->
    <path d="M72,74 C72,62 74,52 76,46" stroke-width="2"/>
    <ellipse cx="76" cy="43" rx="5" ry="7" stroke-width="1.8" transform="rotate(-8,76,43)"/>
    <!-- Small bowl -->
    <path d="M88,64 C84,64 82,72 86,74 C90,76 96,74 94,68 C92,63 88,64 88,64" stroke-width="1.8"/>
    <line x1="82" y1="74" x2="98" y2="74" stroke-width="1.8"/>
  </svg>

  <div class="bottom-space"></div>

  <!-- BUTTONS -->
  <div class="btn-group">
    <button class="btn-primary" onclick="window.location.href='#get-started'">
      Get Started
    </button>
    <button class="btn-secondary" onclick="window.location.href='#sign-in'">
      Sign In
    </button>
  </div>

  <!-- INVITE HINT -->
  <div class="invite-hint">
    Joining someone's household? <a href="#invite">Use your invite link.</a>
  </div>

  <!-- LEGAL -->
  <div class="legal">
    By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </div>

</div>

</body>
</html>
